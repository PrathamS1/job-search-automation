name: Daily Job Search

on:
  schedule:
    # 02:30 UTC = 08:00 IST, every day
    - cron: "30 2 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/main.py

      - name: Commit updated jobs.json
        run: |
          git config user.name "job-search-bot"
          git config user.email "actions@github.com"
          git add data/jobs.json
          git diff --quiet --cached || git commit -m "Daily job update: $(date -u +'%Y-%m-%d')"
          git push
